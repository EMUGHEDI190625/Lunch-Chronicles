  <style>
    body, html {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    .navbar {
      background-color: #1e3a8a;
      color: white;
      padding: 1px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
    }

    .logo {
        padding: 0.5%;
      font-size: 20px;
      font-weight: bold;
    }

    .nav-links {
      display: flex;
    }

    .top_navbar {
      list-style: none;
      display: flex;
      gap: 15px;
      margin: 0;
      padding: 0;
    }

    .top_navbar li {
      position: relative;
    }

    .top_navbar a {
      text-decoration: none;
      color: white;
      padding: 8px 12px;
      display: inline-block;
    }

    .dropdown {
      position: relative;
    }

    .dropdown_content {
      display: none;
      position: absolute;
      background-color: white;
      color: black;
      min-width: 160px;
      top: 100%;
      left: 0;
      z-index: 999;
      box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
    }

    .dropdown_content li {
      list-style: none;
    }

    .dropdown_content a {
      color: black;
      padding: 10px;
      display: block;
      text-decoration: none;
    }

    .dropdown:hover .dropdown_content {
      display: block;
    }

    .header {
      background-image: url('/E-Commerce/Images/LC_Business_image.jpg'); /* Use your image path */
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      height: 40vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: sticky;
      top: 15%;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1;
    }

    .header-content {
      position: relative;
      z-index: 2;
      color: white;
      text-align: center;
    }

    .header-content h1 {
      font-size: 3em;
      margin-bottom: 0.5em;
    }

    .header-content p {
      font-size: 1.2em;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 24px;
      background-color: #ff6600;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1em;
    }

    .btn:hover {
      background-color: #e55a00;
    }

    .cta-button {
        margin: 2% 30%;
        display: inline-block;
        background-color: #ff6600;
        color: white;
        padding: 14px 28px;
        font-size: 16px;
        font-weight: bold;
        border-radius: 8px;
        transition: all 0.3s ease;
        box-shadow: 0 4px 14px rgb(0,0,0,0.1);
        animation: pulse 2s infinite;
    }

    .cta-button:hover {
        background-color: #e65c00;
        transform: scale(1.05);
        box-shadow: 0 6px 20px rgb(0,0,0,0.2);
    }

    @keyframes pulse {
        0% {
            transform: scale(1);
            box-shadow: 0 6px 20px rgb(255,102,0,0.4);
        }
        70% {
            transform: scale(1.03);
            box-shadow: 0 0 0 10px rgb(255,102,0,0);
        }

        100% {
            transform: scale(1);
            box-shadow: 0 6px 20px rgb(255,102,0,0);
        }
    }
  </style>
</head>
